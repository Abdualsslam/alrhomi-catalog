version: '3.8'

services:
  # --- Frontend ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_BASE_URL=https://api-alrohomi.smartagency-ye.com
    container_name: alrhomi-frontend
    restart: unless-stopped
    networks:
      - web-network

  # --- Backend ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: alrhomi-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - REFRESH_TOKEN_EXPIRES_IN=${REFRESH_TOKEN_EXPIRES_IN:-7d}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_BUCKET=${S3_BUCKET}
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - web-network

  # --- Redis (داخلي) ---
  redis:
    image: redis:7-alpine
    container_name: alrhomi-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - web-network

volumes:
  redis_data:

networks:
  web-network:
    external: true